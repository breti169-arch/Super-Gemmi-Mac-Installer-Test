name: Manual macOS Installer Test

on:
  workflow_dispatch:
    inputs:
      user_name:
        description: Nutzername fuer den Test-Workspace
        required: true
        default: Stefan
      agent_name:
        description: Agentenname fuer den Test-Workspace
        required: true
        default: Gemmi
      target_name:
        description: Name des temporaeren Zielordners
        required: true
        default: SuperGemmi_Workspace_Manual_Test
      install_obsidian:
        description: Obsidian via Homebrew Cask installieren
        required: true
        type: boolean
        default: false
      install_codex_cli:
        description: Codex CLI non-interaktiv installieren
        required: true
        type: boolean
        default: false
      install_codex_app:
        description: Codex Desktop-App aus DMG installieren
        required: true
        type: boolean
        default: false
      codex_app_dmg_url:
        description: Optionale DMG-URL fuer Codex Desktop-App; leer nutzt offiziellen Default
        required: false
        default: ''
      install_antigravity:
        description: Google Antigravity Haupt-App aus DMG installieren
        required: true
        type: boolean
        default: false
      antigravity_dmg_url:
        description: Optionale DMG-URL fuer Google Antigravity Haupt-App; leer nutzt offiziellen Default
        required: false
        default: ''

jobs:
  manual-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show macOS environment
        run: |
          sw_vers
          uname -a
          whoami
          echo "HOME=$HOME"
          python3 --version

      - name: Run manual installer test
        run: |
          chmod +x ./install.sh ./package.sh
          TARGET="$RUNNER_TEMP/${{ inputs.target_name }}"
          ARGS=(
            --target "$TARGET" \
            --user "${{ inputs.user_name }}" \
            --agent "${{ inputs.agent_name }}"
          )

          if [[ "${{ inputs.install_obsidian }}" == "true" ]]; then
            ARGS+=(--install-obsidian)
          fi
          if [[ "${{ inputs.install_codex_cli }}" == "true" ]]; then
            ARGS+=(--install-codex-cli)
          fi
          if [[ "${{ inputs.install_codex_app }}" == "true" ]]; then
            ARGS+=(--install-codex-app --codex-app-dmg-url "${{ inputs.codex_app_dmg_url }}")
          fi
          if [[ "${{ inputs.install_antigravity }}" == "true" ]]; then
            ARGS+=(--install-antigravity --antigravity-dmg-url "${{ inputs.antigravity_dmg_url }}")
          fi
          if [[ "${{ inputs.install_obsidian }}${{ inputs.install_codex_cli }}${{ inputs.install_codex_app }}${{ inputs.install_antigravity }}" == "falsefalsefalsefalse" ]]; then
            ARGS+=(--no-app-installs)
          fi

          ./install.sh "${ARGS[@]}"

          echo "SUPER_GEMMI_TARGET=$TARGET" >> "$GITHUB_ENV"

      - name: Verify installed workspace
        run: |
          test -d "$SUPER_GEMMI_TARGET"
          find "$SUPER_GEMMI_TARGET" -maxdepth 2 -print | sort
          test -f "$SUPER_GEMMI_TARGET/AGENTS.md"
          test -f "$SUPER_GEMMI_TARGET/Gemini.md"
          test -f "$SUPER_GEMMI_TARGET/soul_bundle.md"
          test -f "$SUPER_GEMMI_TARGET/User.md"
          test -f "$SUPER_GEMMI_TARGET/Identity.md"
          test -d "$SUPER_GEMMI_TARGET/Wiki"
          test -d "$SUPER_GEMMI_TARGET/Memory"
          ! grep -R "{WORKSPACE}\|{USER}\|{AGENT}" "$SUPER_GEMMI_TARGET"
          grep -F "System-Kerne geladen" "$SUPER_GEMMI_TARGET/AGENTS.md"
          grep -F "System-Kerne geladen" "$SUPER_GEMMI_TARGET/Gemini.md"
          grep -F "$SUPER_GEMMI_TARGET/AGENTS.md" "$SUPER_GEMMI_TARGET/Gemini.md"
          grep -F "START_FILE: Identity.md" "$SUPER_GEMMI_TARGET/soul_bundle.md"
          test -f "$HOME/Library/Application Support/obsidian/obsidian.json"
          if [[ "${{ inputs.install_obsidian }}" == "true" ]]; then
            test -d "/Applications/Obsidian.app"
          fi
          if [[ "${{ inputs.install_codex_cli }}" == "true" ]]; then
            test -x "$HOME/.local/bin/codex" || command -v codex
            "$HOME/.local/bin/codex" --version || codex --version
          fi
          if [[ "${{ inputs.install_codex_app }}" == "true" ]]; then
            test -d "/Applications/Codex.app"
          fi
          if [[ "${{ inputs.install_codex_cli }}${{ inputs.install_codex_app }}" != "falsefalse" ]]; then
            test -f "$HOME/.codex/AGENTS.md"
            test -f "$HOME/.codex/config.toml"
            test -f "$HOME/.codex/.codex-global-state.json"
            grep -F "$SUPER_GEMMI_TARGET/AGENTS.md" "$HOME/.codex/AGENTS.md"
            grep -F "approval_policy = \"never\"" "$HOME/.codex/config.toml"
            grep -F "trust_level = \"trusted\"" "$HOME/.codex/config.toml"
            grep -F "$SUPER_GEMMI_TARGET" "$HOME/.codex/.codex-global-state.json"
          fi
          if [[ "${{ inputs.install_antigravity }}" == "true" ]]; then
            test -d "/Applications/Antigravity.app"
            test -f "$HOME/.gemini/GEMINI.md"
            test -f "$HOME/.gemini/config/config.json"
            test -d "$HOME/.gemini/config/projects"
            test -f "$HOME/Library/Application Support/Antigravity/app_storage.json"
            test -f "$HOME/Library/Application Support/Antigravity/User/settings.json"
            grep -F "$SUPER_GEMMI_TARGET/AGENTS.md" "$HOME/.gemini/GEMINI.md"
            grep -F "$SUPER_GEMMI_TARGET" "$HOME/.gemini/config/projects/"*.json
            grep -F "activeProjectId" "$HOME/.gemini/config/config.json"
            grep -F "window.zoomLevel" "$HOME/Library/Application Support/Antigravity/User/settings.json"
          fi

      - name: Build zip package
        run: |
          ./package.sh

      - name: Test pkg installer
        run: |
          PKG_TARGET="$RUNNER_TEMP/${{ inputs.target_name }}_PKG"
          cat > /tmp/super-gemmi-pkg.env <<EOF
          SUPER_GEMMI_TARGET="$PKG_TARGET"
          SUPER_GEMMI_USER="${{ inputs.user_name }}"
          SUPER_GEMMI_AGENT="${{ inputs.agent_name }}"
          SUPER_GEMMI_INSTALL_OBSIDIAN="false"
          SUPER_GEMMI_INSTALL_CODEX_CLI="false"
          SUPER_GEMMI_INSTALL_CODEX_APP="false"
          SUPER_GEMMI_INSTALL_ANTIGRAVITY="false"
          EOF

          sudo installer -pkg dist/Super-Gemmi-macOS.pkg -target /
          rm -f /tmp/super-gemmi-pkg.env

          test -d "$PKG_TARGET"
          test -f "$PKG_TARGET/AGENTS.md"
          test -f "$PKG_TARGET/Gemini.md"
          test -f "$PKG_TARGET/soul_bundle.md"
          grep -F "System-Kerne geladen" "$PKG_TARGET/AGENTS.md"
          grep -F "$PKG_TARGET/AGENTS.md" "$PKG_TARGET/Gemini.md"
          grep -F "START_FILE: Identity.md" "$PKG_TARGET/soul_bundle.md"
          echo "SUPER_GEMMI_PKG_TARGET=$PKG_TARGET" >> "$GITHUB_ENV"

      - name: Collect installed workspace snapshot
        run: |
          mkdir -p manual-test-result
          find "$SUPER_GEMMI_TARGET" -maxdepth 3 -print | sort > manual-test-result/installed-workspace-files.txt
          shasum -a 256 "$SUPER_GEMMI_TARGET/AGENTS.md" "$SUPER_GEMMI_TARGET/Gemini.md" "$SUPER_GEMMI_TARGET/soul_bundle.md" > manual-test-result/mandate-checksums.txt
          if [[ -d "$HOME/.codex" ]]; then
            mkdir -p manual-test-result/codex
            cp "$HOME/.codex/AGENTS.md" manual-test-result/codex/AGENTS.md 2>/dev/null || true
            cp "$HOME/.codex/config.toml" manual-test-result/codex/config.toml 2>/dev/null || true
            cp "$HOME/.codex/.codex-global-state.json" manual-test-result/codex/codex-global-state.json 2>/dev/null || true
          fi
          if [[ -d "$HOME/.gemini" ]]; then
            mkdir -p manual-test-result/gemini
            cp -R "$HOME/.gemini/config" manual-test-result/gemini/config 2>/dev/null || true
            cp "$HOME/.gemini/GEMINI.md" manual-test-result/gemini/GEMINI.md 2>/dev/null || true
          fi
          if [[ -d "$HOME/Library/Application Support/Antigravity" ]]; then
            mkdir -p manual-test-result/antigravity
            cp "$HOME/Library/Application Support/Antigravity/app_storage.json" manual-test-result/antigravity/app_storage.json 2>/dev/null || true
            cp "$HOME/Library/Application Support/Antigravity/User/settings.json" manual-test-result/antigravity/settings.json 2>/dev/null || true
          fi
          cp -R "$SUPER_GEMMI_TARGET" manual-test-result/workspace
          if [[ -n "${SUPER_GEMMI_PKG_TARGET:-}" && -d "$SUPER_GEMMI_PKG_TARGET" ]]; then
            find "$SUPER_GEMMI_PKG_TARGET" -maxdepth 3 -print | sort > manual-test-result/pkg-installed-workspace-files.txt
            cp -R "$SUPER_GEMMI_PKG_TARGET" manual-test-result/pkg-workspace
          fi
          cp "$HOME/Library/Application Support/obsidian/obsidian.json" manual-test-result/obsidian.json

      - name: Upload manual test result
        uses: actions/upload-artifact@v4
        with:
          name: manual-macos-installer-test-result
          path: |
            dist/Super-Gemmi-macOS-Installer.zip
            dist/Super-Gemmi-macOS.pkg
            manual-test-result
