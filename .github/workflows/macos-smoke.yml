name: macOS Installer Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show macOS environment
        run: |
          sw_vers
          uname -a
          python3 --version

      - name: Run installer smoke test
        run: |
          chmod +x ./test-install.sh ./install.sh ./package.sh
          ./test-install.sh

      - name: Build zip package
        run: |
          ./package.sh

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: super-gemmi-macos-installer
          path: dist/Super-Gemmi-macOS-Installer.zip

